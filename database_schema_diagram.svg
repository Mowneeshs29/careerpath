<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 800" width="1100" height="800">
    <!-- Professional Database Schema / ER Diagram -->
    <defs>
        <!-- Elegant Drop Shadow -->
        <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
            <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#0f172a" flood-opacity="0.08" />
        </filter>
        
        <!-- Arrowhead for Foreign Keys -->
        <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b" />
        </marker>
    </defs>

    <!-- Background -->
    <rect width="1100" height="800" fill="#f8fafc"/>

    <!-- RELATIONAL LINES (FOREIGN KEYS) -->
    <g fill="none" stroke="#64748b" stroke-width="2.5" marker-end="url(#arrow)">
        <!-- Profiles to Users (1:1 / FK) -->
        <path d="M 180 360 L 180 270" />
        <!-- User_Skills to Users (FK to PK) -->
        <path d="M 425 180 L 310 180" />
        <!-- User_Skills to Skills (FK to PK) -->
        <path d="M 555 245 L 555 340" />
        <!-- Career_Skills to Skills (FK to PK) -->
        <path d="M 800 400 L 685 400" />
        <!-- Career_Skills to Careers (FK to PK) -->
        <path d="M 930 340 L 930 295" />
        <!-- Recommendations to Users (FK to PK) -->
        <path d="M 425 630 L 360 630 L 360 230 L 310 230" />
        <!-- Recommendations to Careers (FK to PK) -->
        <path d="M 685 630 L 740 630 L 740 230 L 800 230" />
    </g>


    <!-- TABLES -->
    
    <!-- Users Table (x=50, y=120) -->
    <g transform="translate(50, 120)" filter="url(#shadow)">
        <rect width="260" height="150" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
        <path d="M 0 8 Q 0 0 8 0 L 252 0 Q 260 0 260 8 L 260 40 L 0 40 Z" fill="#334155"/>
        <text x="130" y="26" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="700" text-anchor="middle" fill="#ffffff">Users</text>
        
        <text x="15" y="65" font-family="'Courier New', monospace, sans-serif" font-size="13" font-weight="bold" fill="#0f172a">id</text>
        <text x="245" y="65" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="bold" fill="#f59e0b" text-anchor="end">PK</text>
        
        <text x="15" y="90" font-family="'Courier New', monospace, sans-serif" font-size="13" fill="#475569">email</text>
        <text x="15" y="115" font-family="'Courier New', monospace, sans-serif" font-size="13" fill="#475569">password_hash</text>
        <text x="15" y="140" font-family="'Courier New', monospace, sans-serif" font-size="13" fill="#475569">created_at</text>
    </g>

    <!-- User_Skills Table (x=425, y=120) -->
    <g transform="translate(425, 120)" filter="url(#shadow)">
        <rect width="260" height="125" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
        <path d="M 0 8 Q 0 0 8 0 L 252 0 Q 260 0 260 8 L 260 40 L 0 40 Z" fill="#334155"/>
        <text x="130" y="26" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="700" text-anchor="middle" fill="#ffffff">User_Skills</text>
        
        <text x="15" y="65" font-family="'Courier New', monospace, sans-serif" font-size="13" font-weight="bold" fill="#0f172a">user_id</text>
        <text x="245" y="65" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="bold" fill="#10b981" text-anchor="end">PK, FK</text>
        
        <text x="15" y="90" font-family="'Courier New', monospace, sans-serif" font-size="13" font-weight="bold" fill="#0f172a">skill_id</text>
        <text x="245" y="90" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="bold" fill="#10b981" text-anchor="end">PK, FK</text>
        
        <text x="15" y="115" font-family="'Courier New', monospace, sans-serif" font-size="13" fill="#475569">proficiency</text>
    </g>

    <!-- Careers Table (x=800, y=120) -->
    <g transform="translate(800, 120)" filter="url(#shadow)">
        <rect width="260" height="175" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
        <path d="M 0 8 Q 0 0 8 0 L 252 0 Q 260 0 260 8 L 260 40 L 0 40 Z" fill="#334155"/>
        <text x="130" y="26" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="700" text-anchor="middle" fill="#ffffff">Careers</text>
        
        <text x="15" y="65" font-family="'Courier New', monospace, sans-serif" font-size="13" font-weight="bold" fill="#0f172a">id</text>
        <text x="245" y="65" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="bold" fill="#f59e0b" text-anchor="end">PK</text>
        
        <text x="15" y="90" font-family="'Courier New', monospace, sans-serif" font-size="13" fill="#475569">job_title</text>
        <text x="15" y="115" font-family="'Courier New', monospace, sans-serif" font-size="13" fill="#475569">base_salary</text>
        <text x="15" y="140" font-family="'Courier New', monospace, sans-serif" font-size="13" fill="#475569">market_growth</text>
        <text x="15" y="165" font-family="'Courier New', monospace, sans-serif" font-size="13" fill="#475569">description</text>
    </g>

    <!-- Profiles Table (x=50, y=360) -->
    <g transform="translate(50, 360)" filter="url(#shadow)">
        <rect width="260" height="175" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
        <path d="M 0 8 Q 0 0 8 0 L 252 0 Q 260 0 260 8 L 260 40 L 0 40 Z" fill="#334155"/>
        <text x="130" y="26" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="700" text-anchor="middle" fill="#ffffff">Profiles</text>
        
        <text x="15" y="65" font-family="'Courier New', monospace, sans-serif" font-size="13" font-weight="bold" fill="#0f172a">id</text>
        <text x="245" y="65" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="bold" fill="#f59e0b" text-anchor="end">PK</text>
        
        <text x="15" y="90" font-family="'Courier New', monospace, sans-serif" font-size="13" font-weight="bold" fill="#0f172a">user_id</text>
        <text x="245" y="90" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="bold" fill="#3b82f6" text-anchor="end">FK</text>
        
        <text x="15" y="115" font-family="'Courier New', monospace, sans-serif" font-size="13" fill="#475569">education_level</text>
        <text x="15" y="140" font-family="'Courier New', monospace, sans-serif" font-size="13" fill="#475569">current_role</text>
        <text x="15" y="165" font-family="'Courier New', monospace, sans-serif" font-size="13" fill="#475569">years_experience</text>
    </g>

    <!-- Skills Table (x=425, y=340) -->
    <g transform="translate(425, 340)" filter="url(#shadow)">
        <rect width="260" height="125" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
        <path d="M 0 8 Q 0 0 8 0 L 252 0 Q 260 0 260 8 L 260 40 L 0 40 Z" fill="#334155"/>
        <text x="130" y="26" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="700" text-anchor="middle" fill="#ffffff">Skills</text>
        
        <text x="15" y="65" font-family="'Courier New', monospace, sans-serif" font-size="13" font-weight="bold" fill="#0f172a">id</text>
        <text x="245" y="65" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="bold" fill="#f59e0b" text-anchor="end">PK</text>
        
        <text x="15" y="90" font-family="'Courier New', monospace, sans-serif" font-size="13" fill="#475569">name</text>
        <text x="15" y="115" font-family="'Courier New', monospace, sans-serif" font-size="13" fill="#475569">category</text>
    </g>

    <!-- Career_Skills Table (x=800, y=340) -->
    <g transform="translate(800, 340)" filter="url(#shadow)">
        <rect width="260" height="125" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
        <path d="M 0 8 Q 0 0 8 0 L 252 0 Q 260 0 260 8 L 260 40 L 0 40 Z" fill="#334155"/>
        <text x="130" y="26" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="700" text-anchor="middle" fill="#ffffff">Career_Skills</text>
        
        <text x="15" y="65" font-family="'Courier New', monospace, sans-serif" font-size="13" font-weight="bold" fill="#0f172a">career_id</text>
        <text x="245" y="65" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="bold" fill="#10b981" text-anchor="end">PK, FK</text>
        
        <text x="15" y="90" font-family="'Courier New', monospace, sans-serif" font-size="13" font-weight="bold" fill="#0f172a">skill_id</text>
        <text x="245" y="90" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="bold" fill="#10b981" text-anchor="end">PK, FK</text>
        
        <text x="15" y="115" font-family="'Courier New', monospace, sans-serif" font-size="13" fill="#475569">importance_weight</text>
    </g>

    <!-- Recommendations Table (x=425, y=550) -->
    <g transform="translate(425, 550)" filter="url(#shadow)">
        <rect width="260" height="175" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
        <path d="M 0 8 Q 0 0 8 0 L 252 0 Q 260 0 260 8 L 260 40 L 0 40 Z" fill="#334155"/>
        <text x="130" y="26" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="700" text-anchor="middle" fill="#ffffff">Recommendations</text>
        
        <text x="15" y="65" font-family="'Courier New', monospace, sans-serif" font-size="13" font-weight="bold" fill="#0f172a">id</text>
        <text x="245" y="65" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="bold" fill="#f59e0b" text-anchor="end">PK</text>
        
        <text x="15" y="90" font-family="'Courier New', monospace, sans-serif" font-size="13" font-weight="bold" fill="#0f172a">user_id</text>
        <text x="245" y="90" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="bold" fill="#3b82f6" text-anchor="end">FK</text>
        
        <text x="15" y="115" font-family="'Courier New', monospace, sans-serif" font-size="13" font-weight="bold" fill="#0f172a">career_id</text>
        <text x="245" y="115" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="bold" fill="#3b82f6" text-anchor="end">FK</text>
        
        <text x="15" y="140" font-family="'Courier New', monospace, sans-serif" font-size="13" fill="#475569">match_score</text>
        <text x="15" y="165" font-family="'Courier New', monospace, sans-serif" font-size="13" fill="#475569">generated_at</text>
    </g>

</svg>
